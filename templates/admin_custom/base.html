<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} - NZ TEX IT</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#b6291f',
                            700: '#8a1f15',
                            800: '#7f1d1d',
                            900: '#7f1d1d',
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        .smooth-transition { transition: all 0.3s ease; }
    </style>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 antialiased dark:bg-gray-900 dark:text-white min-h-screen">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-800 shadow-xl z-40 border-r border-gray-200 dark:border-gray-700">
        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
            <h1 class="text-xl font-bold">
                <span class="bg-gradient-to-r from-[#b6291f] to-[#ff6b6b] bg-clip-text text-transparent">NZ TEX IT</span>
                <span class="text-gray-600 dark:text-gray-300 text-sm font-normal"> Admin</span>
            </h1>
        </div>
        
        <nav class="p-4 space-y-2">
            <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-gradient-to-r from-[#b6291f] to-[#8a1f15] text-white{% else %}text-gray-600 dark:text-gray-300 hover:bg-[#b6291f]/10{% endif %} smooth-transition">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'admin_users' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium {% if request.resolver_match.url_name == 'admin_users' %}bg-gradient-to-r from-[#b6291f] to-[#8a1f15] text-white{% else %}text-gray-600 dark:text-gray-300 hover:bg-[#b6291f]/10{% endif %} smooth-transition">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span>Users</span>
            </a>
            <a href="{% url 'admin_roles' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium {% if request.resolver_match.url_name == 'admin_roles' %}bg-gradient-to-r from-[#b6291f] to-[#8a1f15] text-white{% else %}text-gray-600 dark:text-gray-300 hover:bg-[#b6291f]/10{% endif %} smooth-transition">
                <i data-lucide="shield" class="w-5 h-5"></i>
                <span>Roles</span>
            </a>
            <a href="{% url 'admin_modules' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium {% if request.resolver_match.url_name == 'admin_modules' %}bg-gradient-to-r from-[#b6291f] to-[#8a1f15] text-white{% else %}text-gray-600 dark:text-gray-300 hover:bg-[#b6291f]/10{% endif %} smooth-transition">
                <i data-lucide="boxes" class="w-5 h-5"></i>
                <span>Modules</span>
            </a>
            
            <div class="pt-4 mt-4 border-t border-gray-200 dark:border-gray-700">
                <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-[#b6291f]/10 smooth-transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span>Back to Site</span>
                </a>
                <a href="{% url 'logout' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20 smooth-transition">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>Logout</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 p-8">
        {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
            <div class="p-4 rounded-xl {% if message.tags == 'success' %}bg-green-100 text-green-700 border border-green-200{% elif message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200{% else %}bg-blue-100 text-blue-700 border border-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
