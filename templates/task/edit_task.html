{% extends 'base.html' %}

{% block title %}Edit Task - NZ TEX IT{% endblock %}

{% block content %}
<section class="pt-20 pb-12 min-h-screen">
    <div class="w-full px-4 max-w-3xl mx-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Edit Task</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Update task details</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-soft p-6">
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- Title -->
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Title</label>
                    <input type="text" name="title" id="title" required value="{{ task.title }}"
                        class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Description</label>
                    <textarea name="description" id="description" rows="4"
                        class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">{{ task.description }}</textarea>
                </div>

                <!-- Status & Priority Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Status</label>
                        <select name="status" id="status"
                            class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">
                            <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>Pending</option>
                            <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                            <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completed</option>
                        </select>
                    </div>
                    <div>
                        <label for="priority" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Priority</label>
                        <select name="priority" id="priority"
                            class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">
                            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
                            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
                        </select>
                    </div>
                </div>

                <!-- Due Date & Category Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="due_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Due Date</label>
                        <input type="date" name="due_date" id="due_date" value="{{ task.due_date|date:'Y-m-d' }}"
                            class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">
                    </div>
                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Problem Type</label>
                        <div class="flex gap-2">
                            <select name="category" id="category"
                                class="flex-1 px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">
                                <option value="">Select Problem</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if task.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                            <button type="button" onclick="openAddProblemModal()"
                                class="px-3 py-2.5 text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-lg smooth-transition">
                                +
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Department -->
                <div>
                    <label for="department" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Department</label>
                    <select name="department" id="department"
                        class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent smooth-transition">
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if task.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Assign To -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Assign To</label>
                    <div class="max-h-40 overflow-y-auto p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 space-y-2">
                        {% for user in users %}
                        <label class="flex items-center gap-2.5 p-2 hover:bg-gray-50 dark:hover:bg-gray-600 rounded-md cursor-pointer smooth-transition">
                            <input type="checkbox" name="assigned_to" value="{{ user.id }}"
                                {% if user in task.assigned_to.all %}checked{% endif %}
                                class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                            <span class="text-sm text-gray-700 dark:text-gray-300">{{ user.get_full_name|default:user.username }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full py-2.5 px-4 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg smooth-transition">
                    Update Task
                </button>
            </form>
        </div>
    </div>
</section>

<!-- Add Problem Modal -->
<div id="addProblemModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white dark:bg-gray-800">
        <div class="mt-3">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Add New Problem Type</h3>
            <form id="addProblemForm" onsubmit="addProblem(event)">
                <input type="text" id="newProblemName" placeholder="Enter problem type"
                    class="w-full px-4 py-2.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent mb-4">
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="closeAddProblemModal()"
                        class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg">
                        Add
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function openAddProblemModal() {
    document.getElementById('addProblemModal').classList.remove('hidden');
    document.getElementById('newProblemName').focus();
}

function closeAddProblemModal() {
    document.getElementById('addProblemModal').classList.add('hidden');
    document.getElementById('newProblemName').value = '';
}

function addProblem(event) {
    event.preventDefault();
    const problemName = document.getElementById('newProblemName').value.trim();
    if (!problemName) return;
    
    fetch('/tasks/add-problem/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({ name: problemName })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const select = document.getElementById('category');
            const option = new Option(data.name, data.id);
            select.add(option);
            select.value = data.id;
            closeAddProblemModal();
        } else {
            alert(data.error || 'Error adding problem type');
        }
    })
    .catch(error => alert('Error adding problem type'));
}
</script>
{% endblock %}
